<!DOCTYPE html>
<html>
<head>
    <title>Criar Personagem</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        form {
            display: inline-block;
            text-align: left;
        }

        input {
            display: block;
            margin: 10px 0;
            padding: 8px;
            width: 250px;
        }

        button {
            padding: 10px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
        }

        button:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <h1>Criar Personagem</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Nome:</label>
        <input type="text" name="name" required>

        <label>Status:</label>
        <input type="text" name="status" required>

        <label>Espécie:</label>
        <input type="text" name="species" required>

        <button type="submit">Criar</button>
    </form>

</body>
</html>
