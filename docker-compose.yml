version: '3.9'

services:
  db:
    image: postgres
    environment:
      POSTGRES_DB: fabrica
      POSTGRES_USER: fabrica
      POSTGRES_PASSWORD: fabrica
    ports:
      - "5432:5432"

  web:
    build: .
    command: python backend/manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db